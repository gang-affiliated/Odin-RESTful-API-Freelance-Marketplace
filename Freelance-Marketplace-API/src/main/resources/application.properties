spring.application.name=Freelance-Marketplace-API
spring.profiles.default=demo

# Demo profile: keeps app bootable before DB-backed implementation.
# This avoids startup failures while we present architecture and API plan.
#---
spring.config.activate.on-profile=demo
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
