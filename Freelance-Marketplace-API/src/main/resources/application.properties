spring.application.name=Freelance-Marketplace-API
spring.profiles.default=demo

# Demo profile: uses in-memory DB for local smoke testing.
#---
spring.config.activate.on-profile=demo
spring.datasource.url=jdbc:h2:mem:freelance_demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
